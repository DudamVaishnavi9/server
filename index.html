<!DOCTYPE html>
<html>
<head><title>Task Manager</title>
    <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background-color: #f4f4f4; }
    h1 { text-align: center; color: #333; }
    #task-form { display: flex; gap: 10px; margin-bottom: 20px; }
    #task-input { flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
    #task-list { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .task-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .task-item:last-child { border-bottom: none; }
    button { cursor: pointer; padding: 5px 10px; border-radius: 5px; border: none; }
    .add-btn { background: #28a745; color: white; }
    .done-btn { background: #007bff; color: white; }
    .delete-btn { background: #dc3545; color: white; }
</style>
</head>
<body>
    <h1>Task Manager</h1>
    <form id="task-form">
        <input type="text" id="task-input" placeholder="Enter task..." required>
        <button type="submit">Add Task</button>
    </form>
    <ul id="task-list"></ul>

    <script src="app.js"></script>
</body>
</html>
